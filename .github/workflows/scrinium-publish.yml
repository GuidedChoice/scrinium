name: scrinium:publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      NEXT_VERSION: ${{ steps.get-version.outputs.NEXT_VERSION }}
      NEXT_VERSION_NO_PREFIX: ${{ steps.get-version.outputs.NEXT_VERSION_NO_PREFIX }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: get-version
        uses: joemcbride/git-version-lite@v3.2.0
        with:
          calculate-prerelease-version: false
          branch-name: ${{ github.ref }}
          tag-prefix: scrinium-
          fallback-to-no-prefix-search: false
          default-release-type: minor
          create-ref: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          echo "The next version is ${{ env.NEXT_VERSION }}"
          echo "The next version without the prefix is ${{ env.NEXT_VERSION_NO_PREFIX }}"

  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [get-version]
    permissions:
      contents: read
      id-token: write
    env:
      CI: true
      NEXT_VERSION_NO_PREFIX: ${{ needs.get-version.outputs.NEXT_VERSION_NO_PREFIX }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Set Version
        run: |
          sed -i.bak -e 's/"version": .*"/"version": '\"${{ env.NEXT_VERSION_NO_PREFIX }}\"'/g' "./package.json"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Cleanup
        if: always()
        continue-on-error: true
        run: rm -f package.json.bak

      - name: Status
        if: always()
        continue-on-error: true
        run: echo "🍏 This job's status is ${{ job.status }}."
